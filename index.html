<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Language</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
            color: #333;
            flex-direction: column;
        }
        .language-selector {
            text-align: center;
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .language-selector h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .language-button {
            display: inline-block;
            background-color: #333;
            color: white;
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2em;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }
        .language-button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <div class="language-selector">
        <h1>Selecione o Idioma / Select Language</h1>
        <a href="index-pt.html" class="language-button">Português</a>
        <a href="index-en.html" class="language-button">English</a>
    </div>
</body>
</html>
